{% extends 'base.html' %}
{% block title %}{{ 标题 }}{% endblock %}
{% block content %}
<h1 class="h3 mb-3">{{ 标题 }}</h1>
<div class="alert alert-success">导入成功 {{ 成功条数 }} 条</div>
<div class="alert alert-warning">导入失败 {{ 失败列表|length }} 条</div>
<a class="btn btn-outline-secondary mb-3" href="{{ url_for('excel_tools') }}">返回 Excel 工具页</a>

{% if 失败列表 %}
<div class="table-responsive">
    <table class="table table-bordered table-sm">
        <thead><tr><th>行号</th><th>错误原因</th><th>原始数据</th></tr></thead>
        <tbody>
            {% for item in 失败列表 %}
            <tr>
                <td>{{ item.行号 }}</td>
                <td>{{ item.原因 }}</td>
                <td>{{ item.数据 }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endif %}
{% endblock %}
