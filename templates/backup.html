{% extends 'base.html' %}
{% block title %}备份管理{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="h4 mb-0">备份管理（仅管理员）</h1>
</div>

<div class="card shadow-sm mb-3">
    <div class="card-body">
        <div class="d-flex gap-2 flex-wrap">
            <form method="post">
                <input type="hidden" name="action" value="backup_db">
                <button class="btn btn-primary" type="submit">一键备份数据库</button>
            </form>
            <form method="post">
                <input type="hidden" name="action" value="backup_uploads">
                <button class="btn btn-outline-primary" type="submit">一键备份 uploads</button>
            </form>
        </div>
    </div>
</div>

<div class="card shadow-sm">
    <div class="card-header">最近备份文件</div>
    <ul class="list-group list-group-flush">
        {% for file in files %}
        <li class="list-group-item d-flex justify-content-between">
            <span>{{ file.name }}</span>
            <span class="text-muted">保存在 backups/</span>
        </li>
        {% else %}
        <li class="list-group-item text-muted">暂无备份文件。</li>
        {% endfor %}
    </ul>
</div>
{% endblock %}
