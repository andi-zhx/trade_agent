{% extends 'base.html' %}
{% block title %}企业列表{% endblock %}
{% block content %}
<h1 class="h3 mb-3">企业列表</h1>
<div class="table-responsive">
<table class="table table-striped table-bordered">
    <thead><tr><th>企业编号</th><th>企业名称</th><th>省市</th><th>操作</th></tr></thead>
    <tbody>
    {% for e in enterprises %}
        <tr>
            <td>{{ e.enterprise_code }}</td>
            <td>{{ e.company_name }}</td>
            <td>{{ e.province or '' }} {{ e.city or '' }}</td>
            <td><a class="btn btn-sm btn-outline-primary" href="{{ url_for('enterprise_detail', enterprise_id=e.id) }}">查看详情</a></td>
        </tr>
    {% else %}
        <tr><td colspan="4" class="text-center text-muted">暂无企业数据</td></tr>
    {% endfor %}
    </tbody>
</table>
</div>
{% endblock %}
