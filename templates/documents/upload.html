{% extends 'base.html' %}
{% block title %}文件上传归档{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="h4 mb-0">文件归档上传</h1>
    <a href="{{ url_for('document_list') }}" class="btn btn-outline-secondary">返回文件列表</a>
</div>

<form method="post" enctype="multipart/form-data" class="card shadow-sm">
    <div class="card-body row g-3">
        <div class="col-md-4">
            <label class="form-label">所属企业 <span class="text-danger">*</span></label>
            <select name="enterprise_id" class="form-select" required>
                <option value="">请选择企业</option>
                {% for e in enterprises %}
                <option value="{{ e.id }}" {% if form_data.get('enterprise_id')|string == e.id|string %}selected{% endif %}>{{ e.enterprise_code }} - {{ e.company_name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-4">
            <label class="form-label">所属产品</label>
            <select name="product_id" class="form-select">
                <option value="">（可选）</option>
                {% for p in products %}
                <option value="{{ p.id }}" {% if form_data.get('product_id')|string == p.id|string %}selected{% endif %}>{{ p.product_code }} - {{ p.product_name_cn }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-4">
            <label class="form-label">文件类型 <span class="text-danger">*</span></label>
            <select name="document_type" class="form-select" required>
                <option value="">请选择类型</option>
                {% for code, label in document_types %}
                <option value="{{ code }}" {% if form_data.get('document_type') == code %}selected{% endif %}>{{ label }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-4">
            <label class="form-label">文件名称 <span class="text-danger">*</span></label>
            <input name="document_name" class="form-control" required value="{{ form_data.get('document_name', '') }}">
        </div>
        <div class="col-md-2">
            <label class="form-label">版本号</label>
            <input name="version" class="form-control" value="{{ form_data.get('version', 'V01') }}">
        </div>
        <div class="col-md-2">
            <label class="form-label">上传人</label>
            <input name="uploaded_by" class="form-control" value="{{ form_data.get('uploaded_by', '') }}">
        </div>

        <div class="col-12">
            <label class="form-label">备注</label>
            <textarea name="notes" rows="3" class="form-control">{{ form_data.get('notes', '') }}</textarea>
        </div>

        <div class="col-12">
            <label class="form-label">文件 <span class="text-danger">*</span></label>
            <input type="file" name="file" class="form-control" required>
        </div>
    </div>
    <div class="card-footer d-flex justify-content-end gap-2">
        <a href="{{ url_for('document_list') }}" class="btn btn-outline-secondary">取消</a>
        <button class="btn btn-primary" type="submit">上传并归档</button>
    </div>
</form>
{% endblock %}
