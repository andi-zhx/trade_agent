{% extends 'base.html' %}

{% block title %}登录 - 跨境经贸企业库与产品管理系统{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h1 class="h4 mb-3 text-center">系统登录</h1>
                <p class="text-muted text-center small">默认账号：admin/admin123（管理员），user/user123（普通用户）</p>

                <form method="post">
                    <div class="mb-3">
                        <label for="用户名" class="form-label">用户名</label>
                        <input id="用户名" name="用户名" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label for="密码" class="form-label">密码</label>
                        <input id="密码" name="密码" type="password" class="form-control" required>
                    </div>
                    <button class="btn btn-primary w-100" type="submit">登录</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
